name: Build Moonlight

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Find Xcode project
        run: find . -name "*.xcworkspace" -o -name "*.xcodeproj" | head -20

      - name: Build app
        run: |
          xcodebuild \
            -project Moonlight.xcodeproj \
            -scheme Moonlight \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO