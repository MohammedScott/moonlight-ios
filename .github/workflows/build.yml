name: Build Moonlight

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Force Xcode 16.2 only
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          sudo rm -rf /Applications/Xcode.app
          xcodebuild -version

      - name: Build app
        run: |
          xcodebuild \
            -project Moonlight.xcodeproj \
            -scheme Moonlight \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt