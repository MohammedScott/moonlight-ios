name: Build Moonlight

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Xcode 16.2 only
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          sudo rm -rf /Applications/Xcode.app

      - name: Build app
        run: |
          xcodebuild \
            -project Moonlight.xcodeproj \
            -scheme Moonlight \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -archivePath $PWD/build/Moonlight.xcarchive \
            archive \
            2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Export IPA
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/Moonlight.xcarchive \
            -exportPath $PWD/build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 || true

      - name: Package app for sideloading
        run: |
          mkdir -p Payload
          cp -r build/Moonlight.xcarchive/Products/Applications/Moonlight.app Payload/
          zip -r Moonlight.ipa Payload
          ls -lh Moonlight.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Moonlight-IPA
          path: Moonlight.ipa

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt