name: Build Moonlight Plus

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Force Xcode 16.2 only
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          sudo rm -rf /Applications/Xcode.app

      - name: Build app
        run: |
          xcodebuild \
            -project Moonlight.xcodeproj \
            -scheme Moonlight \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -archivePath $PWD/build/Moonlight.xcarchive \
            archive \
            2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Moonlight.xcarchive/Products/Applications/Moonlight.app Payload/
          zip -r MoonlightPlus.ipa Payload
          ls -lh MoonlightPlus.ipa

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoonlightPlus-IPA
          path: MoonlightPlus.ipa

      - name: Upload IPA to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: MoonlightPlus.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt